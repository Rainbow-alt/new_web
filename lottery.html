<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 小玉玉的幸运大转盘</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8d8e8 20%, #e8d8f0 45%, #d8e4f8 65%, #d0eaf8 85%, #c8e8f4 100%);
            background-attachment: fixed;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #petalCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 8px 40px rgba(200, 150, 180, 0.22), 0 0 80px rgba(200, 180, 210, 0.12);
            padding: 40px 44px;
            text-align: center;
            max-width: 520px;
            width: 100%;
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .title {
            font-size: 34px;
            font-weight: 700;
            color: #d4687c;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 15px;
            color: #c090a0;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        .wheel-container {
            position: relative;
            width: 340px;
            height: 340px;
            margin: 0 auto 24px;
        }

        .pointer-mark {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 32px solid #ff6b8a;
            filter: drop-shadow(0 3px 5px rgba(200, 100, 130, 0.5));
        }
        .pointer-dot {
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            width: 14px;
            height: 14px;
            background: #ff6b8a;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 107, 138, 0.6);
        }

        #wheelCanvas {
            border-radius: 50%;
            box-shadow:
                0 0 0 10px rgba(255, 185, 205, 0.35),
                0 0 0 22px rgba(255, 205, 215, 0.18),
                0 4px 30px rgba(200, 150, 170, 0.3);
            position: relative;
            z-index: 1;
        }

        .prize-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
            margin-bottom: 20px;
        }
        .prize-tag {
            font-size: 13px;
            color: #a07080;
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 12px;
            border-radius: 14px;
            letter-spacing: 1px;
        }

        .btn-spin {
            display: inline-block;
            padding: 14px 48px;
            background: linear-gradient(135deg, #ff7b9a, #ff9ab2, #f8a4c8);
            color: #fff;
            border: none;
            border-radius: 35px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(248, 120, 150, 0.45);
            transition: all 0.3s ease;
            animation: btnGlow 2.2s ease-in-out infinite;
        }
        .btn-spin:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 10px 32px rgba(248, 120, 150, 0.6);
        }
        .btn-spin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            animation: none;
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 6px 24px rgba(248, 120, 150, 0.45); }
            50% { box-shadow: 0 6px 36px rgba(248, 120, 150, 0.7); }
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #c090a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #d4687c; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-box {
            background: #fff;
            border-radius: 24px;
            padding: 36px 32px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #d4687c;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .modal-desc {
            font-size: 15px;
            color: #888;
            margin-bottom: 18px;
            line-height: 1.7;
            letter-spacing: 1px;
        }
        .modal-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f0c0d0;
            border-radius: 18px;
            font-size: 16px;
            text-align: center;
            outline: none;
            color: #666;
            letter-spacing: 1px;
            transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: #ff8a9e; }
        .modal-input.shake {
            border-color: #ff6b6b;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .modal-btn {
            display: inline-block;
            margin-top: 14px;
            padding: 12px 36px;
            background: linear-gradient(135deg, #ff7b9a, #f8a4c8);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(248, 120, 150, 0.4);
            transition: all 0.2s;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(248, 120, 150, 0.55);
        }
        .modal-btn.close-btn {
            background: #e0d0d8;
            box-shadow: 0 4px 16px rgba(180, 160, 170, 0.3);
            margin-left: 10px;
        }

        .wrong-msg {
            color: #e88890;
            font-size: 13px;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(0,0,0,0.06);
            border-radius: 50%;
            font-size: 18px;
            color: #999;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }
        .modal-close:hover {
            background: rgba(0,0,0,0.12);
            color: #666;
        }

        @media (max-width: 500px) {
            .card { padding: 28px 16px; border-radius: 20px; }
            .title { font-size: 26px; }
            .wheel-container { width: 280px; height: 280px; }
            #wheelCanvas { width: 280px; height: 280px; }
            .pointer-mark {
                border-left-width: 16px;
                border-right-width: 16px;
                border-top-width: 26px;
                top: -8px;
            }
            .pointer-dot {
                width: 12px; height: 12px; top: -34px;
            }
            .btn-spin { padding: 12px 36px; font-size: 17px; }
            .modal-box { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <canvas id="petalCanvas"></canvas>

    <div id="app">
        <div class="card">
            <div class="title">🎀 幸运大转盘 🎀</div>
            <div class="subtitle">小玉玉的专属抽奖</div>

            <div class="wheel-container">
                <div class="pointer-dot"></div>
                <div class="pointer-mark"></div>
                <canvas ref="wheelCanvas" id="wheelCanvas" width="340" height="340"></canvas>
            </div>

            <div class="prize-list">
                <span class="prize-tag" v-for="p in prizes" :key="p.label">{{ p.icon }} {{ p.label }}</span>
            </div>

            <button class="btn-spin" @click="startSpin" :disabled="spinning">
                {{ spinning ? '🎰 转动中...' : '🎯 开始抽奖' }}
            </button>

            <div style="margin-top:16px;">
                <a href="index.html" class="back-link">← 返回主页</a>
            </div>
        </div>

        <!-- Question Modal -->
        <div class="modal-overlay" v-if="showQuestion" @click.self="showQuestion = false">
            <div class="modal-box">
                <button class="modal-close" @click="showQuestion = false">✕</button>
                <div class="modal-icon">🎁</div>
                <div class="modal-title">恭喜抽中 佳能相机大礼包！</div>
                <div class="modal-desc">
                    请回答以下问题，答对即可领取奖品~<br><br>
                    <strong style="color:#d4687c;font-size:17px;">
                        请问小林和小玉确认关系的地方是哪里？
                    </strong>
                </div>
                <input
                    class="modal-input"
                    :class="{ shake: showWrong }"
                    v-model="answer"
                    placeholder="请输入你的答案"
                    @keyup.enter="checkAnswer"
                    ref="answerInput"
                />
                <div class="wrong-msg" v-if="showWrong">不对哦，再想想~ 💭</div>
                <button class="modal-btn" @click="checkAnswer">确认提交</button>
            </div>
        </div>

        <!-- Congratulations Modal -->
        <div class="modal-overlay" v-if="showCongrats">
            <div class="modal-box">
                <div class="modal-icon">🎉</div>
                <div class="modal-title">恭喜你获得大奖！</div>
                <div class="modal-desc">
                    🌟 <strong>佳能相机大礼包一份</strong> 🌟<br><br>
                    请私信<strong>小林</strong>获取领奖地址噢~<br>
                    <span style="font-size:13px;color:#aaa;">领奖暗号：头步桥红绿灯的人行道</span>
                </div>
                <button class="modal-btn close-btn" @click="showCongrats = false">知道啦 ~</button>
            </div>
        </div>
    </div>

    <!-- Cherry blossom animation (independent of Vue) -->
    <script>
        (function() {
            const canvas = document.getElementById('petalCanvas');
            const ctx = canvas.getContext('2d');
            const palette = ['#FFB7C5','#FFC0CB','#FFAAB8','#FFB8C6','#F8A4C8','#FFD1DC','#FF9AB2','#FAB8C4','#FFCCD5','#FFB3C6','#FFC4D0','#FDC5CD','#FFBBC8','#FFAEC0','#FFD6E0','#F9C0C8'];

            let petals = [], sparkles = [], w, h;

            function resize() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
            }

            function mkPetal(above) {
                const s = 6 + Math.random() * 20;
                const d = (s - 6) / 20;
                return {
                    x: Math.random() * (w + 200) - 100,
                    y: above ? -(Math.random() * h * 0.6) : Math.random() * h * 1.2 - h * 0.1,
                    size: s, vx: 0.3 + Math.random() * 1.8,
                    vy: 1.2 + Math.random() * 2.8 - d * 1.4,
                    rot: Math.random() * Math.PI * 2,
                    rSpd: (Math.random() - 0.5) * 0.03,
                    swPh: Math.random() * Math.PI * 2,
                    swSpd: 0.008 + Math.random() * 0.025,
                    swAmp: 0.3 + Math.random() * 2.5,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    opacity: 0.3 + Math.random() * 0.55 - d * 0.2,
                };
            }

            function mkSparkle(above) {
                return {
                    x: Math.random() * w,
                    y: above ? -(Math.random() * h) : Math.random() * h,
                    size: 1 + Math.random() * 3,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: 0.2 + Math.random() * 1.2,
                    opacity: 0, maxOp: 0.4 + Math.random() * 0.6,
                    ph: Math.random() * Math.PI * 2,
                    twSpd: 0.02 + Math.random() * 0.06,
                };
            }

            function drawPetal(x, y, s, r, c, o) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, o));
                ctx.translate(x, y);
                ctx.rotate(r);
                ctx.fillStyle = c;
                ctx.beginPath();
                const w2 = s * 0.38, h2 = s * 0.9;
                ctx.moveTo(0, -h2);
                ctx.bezierCurveTo(w2, -h2 * 0.55, w2 * 1.1, h2 * 0.25, 0, h2 * 0.75);
                ctx.bezierCurveTo(-w2 * 1.1, h2 * 0.25, -w2, -h2 * 0.55, 0, -h2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.beginPath();
                ctx.ellipse(0, -s * 0.25, s * 0.15, s * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function drawSparkle(x, y, s, o) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, o));
                const g = ctx.createRadialGradient(x, y, 0, x, y, s);
                g.addColorStop(0, 'rgba(255,255,255,1)');
                g.addColorStop(0.3, 'rgba(255,240,245,0.6)');
                g.addColorStop(1, 'rgba(255,220,235,0)');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(x, y, s, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function init() {
                petals = []; sparkles = [];
                for (let i = 0; i < 70; i++) petals.push(mkPetal(false));
                for (let i = 0; i < 40; i++) sparkles.push(mkSparkle(false));
            }

            function loop() {
                ctx.clearRect(0, 0, w, h);
                for (const p of petals) {
                    p.swPh += p.swSpd;
                    p.x += p.vx + Math.sin(p.swPh) * p.swAmp * 0.3;
                    p.y += p.vy;
                    p.rot += p.rSpd;
                    drawPetal(p.x, p.y, p.size, p.rot, p.color, p.opacity);
                    if (p.y > h + p.size * 2 || p.x > w + p.size * 2 || p.x < -p.size * 2) {
                        const n = mkPetal(true);
                        Object.assign(p, { x: n.x, y: n.y, size: n.size, vx: n.vx, vy: n.vy, rot: n.rot, rSpd: n.rSpd, swPh: n.swPh, swSpd: n.swSpd, swAmp: n.swAmp, color: n.color, opacity: n.opacity });
                    }
                }
                for (const s of sparkles) {
                    s.ph += s.twSpd;
                    s.opacity = s.maxOp * (0.5 + 0.5 * Math.sin(s.ph));
                    s.x += s.vx; s.y += s.vy;
                    drawSparkle(s.x, s.y, s.size, s.opacity);
                    if (s.y > h + 10 || s.x > w + 10 || s.x < -10) {
                        const n = mkSparkle(true);
                        Object.assign(s, { x: n.x, y: n.y, size: n.size, vx: n.vx, vy: n.vy, maxOp: n.maxOp, ph: n.ph, twSpd: n.twSpd });
                    }
                }
                requestAnimationFrame(loop);
            }

            window.addEventListener('resize', () => { resize(); init(); });
            resize(); init(); loop();
        })();
    </script>

    <!-- Vue App -->
    <script>
        const { createApp } = Vue;

        const prizes = [
            { label: '520红包', icon: '🧧' },
            { label: '一束鲜花', icon: '💐' },
            { label: '谢谢惠顾', icon: '😊' },
            { label: '佳能相机', icon: '📷' },
            { label: '爱心抱枕', icon: '🧸' },
            { label: '甜蜜糖果', icon: '🍬' },
            { label: '再来一次', icon: '🔄' },
            { label: '幸运星', icon: '⭐' },
        ];
        const segColors = [
            '#FFD4D4', '#FFE4D0', '#FFF6D4', '#D4F0D4',
            '#D4E4F0', '#E8D4F0', '#F0D4E4', '#F8F0D4',
        ];
        const TARGET_INDEX = 3;
        const SEG_ANGLE = (2 * Math.PI) / prizes.length;

        createApp({
            data() {
                return {
                    spinning: false,
                    showQuestion: false,
                    showCongrats: false,
                    showWrong: false,
                    answer: '',
                    prizes: prizes,
                    angle: 0,
                };
            },
            mounted() {
                this.canvas = this.$refs.wheelCanvas;
                this.ctx = this.canvas.getContext('2d');
                this.SIZE = this.canvas.width;
                this.CX = this.SIZE / 2;
                this.CY = this.SIZE / 2;
                this.R = this.SIZE / 2 - 10;
                this.requestedSize = this.SIZE;
                this.drawWheel();
            },
            methods: {
                drawWheel() {
                    const ctx = this.ctx;
                    const SIZE = this.SIZE;
                    const CX = this.CX;
                    const CY = this.CY;
                    const R = this.R;
                    const angle = this.angle;

                    ctx.clearRect(0, 0, SIZE, SIZE);

                    // Outer decorative ring
                    ctx.beginPath();
                    ctx.arc(CX, CY, R + 8, 0, 2 * Math.PI);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,200,210,0.5)';
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    // Segments
                    for (let i = 0; i < prizes.length; i++) {
                        const startA = angle + i * SEG_ANGLE - Math.PI / 2;
                        const endA = startA + SEG_ANGLE;

                        // Segment fill
                        ctx.beginPath();
                        ctx.moveTo(CX, CY);
                        ctx.arc(CX, CY, R, startA, endA);
                        ctx.closePath();
                        ctx.fillStyle = segColors[i];
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
                        ctx.lineWidth = 2.5;
                        ctx.stroke();

                        // Inner lighter highlight
                        ctx.beginPath();
                        ctx.moveTo(CX, CY);
                        ctx.arc(CX, CY, R * 0.55, startA, endA);
                        ctx.closePath();
                        ctx.fillStyle = 'rgba(255,255,255,0.25)';
                        ctx.fill();

                        // Text
                        const midA = startA + SEG_ANGLE / 2;
                        const textR = R * 0.68;
                        const tx = CX + Math.cos(midA) * textR;
                        const ty = CY + Math.sin(midA) * textR;

                        ctx.save();
                        ctx.translate(tx, ty);
                        ctx.rotate(midA + Math.PI / 2);
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';

                        // Icon
                        ctx.fillStyle = '#6B5058';
                        ctx.font = 'bold 16px "PingFang SC", "Microsoft YaHei", sans-serif';
                        ctx.fillText(prizes[i].icon, 0, -10);

                        // Label
                        ctx.fillStyle = '#7B5862';
                        ctx.font = 'bold 13px "PingFang SC", "Microsoft YaHei", sans-serif';
                        ctx.fillText(prizes[i].label, 0, 10);
                        ctx.restore();

                        // Dot on segment divider
                        const dotR = R * 0.9;
                        const dx = CX + Math.cos(startA) * dotR;
                        const dy = CY + Math.sin(startA) * dotR;
                        ctx.beginPath();
                        ctx.arc(dx, dy, 3, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(255,255,255,0.8)';
                        ctx.fill();
                    }

                    // Outer ring dots between segments
                    for (let i = 0; i < prizes.length; i++) {
                        const dotA = angle + i * SEG_ANGLE - Math.PI / 2;
                        const dotR = R + 2;
                        const dx = CX + Math.cos(dotA) * dotR;
                        const dy = CY + Math.sin(dotA) * dotR;
                        ctx.beginPath();
                        ctx.arc(dx, dy, 4, 0, 2 * Math.PI);
                        ctx.fillStyle = '#fff';
                        ctx.fill();
                    }

                    // Center circle
                    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 30);
                    grad.addColorStop(0, '#fff');
                    grad.addColorStop(0.4, '#fff5f7');
                    grad.addColorStop(1, '#ffd0da');
                    ctx.beginPath();
                    ctx.arc(CX, CY, 30, 0, 2 * Math.PI);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,220,230,0.9)';
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    // Center text
                    ctx.fillStyle = '#ff6b8a';
                    ctx.font = 'bold 20px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('抽奖', CX, CY - 3);
                },

                startSpin() {
                    if (this.spinning) return;
                    this.spinning = true;

                    const segCenter = TARGET_INDEX * SEG_ANGLE + SEG_ANGLE / 2;
                    const destAngle = 2 * Math.PI - segCenter + (Math.random() - 0.5) * SEG_ANGLE * 0.65;
                    const fullSpins = (5 + Math.floor(Math.random() * 3)) * 2 * Math.PI;
                    const totalTarget = this.angle + fullSpins + destAngle;

                    const startAngle = this.angle;
                    const spinAmount = totalTarget - startAngle;
                    const duration = 5000 + Math.random() * 1000;
                    const startTime = performance.now();

                    const step = (now) => {
                        const elapsed = now - startTime;
                        const t = Math.min(elapsed / duration, 1);
                        // Cubic ease out
                        const eased = 1 - Math.pow(1 - t, 3);
                        this.angle = startAngle + spinAmount * eased;
                        this.drawWheel();

                        if (t < 1) {
                            requestAnimationFrame(step);
                        } else {
                            this.angle = totalTarget;
                            this.drawWheel();
                            this.spinning = false;
                            setTimeout(() => {
                                this.showQuestion = true;
                                this.answer = '';
                                this.showWrong = false;
                                this.$nextTick(() => {
                                    const inp = this.$refs.answerInput;
                                    if (inp) inp.focus();
                                });
                            }, 500);
                        }
                    };

                    requestAnimationFrame(step);
                },

                checkAnswer() {
                    const ans = this.answer.trim();
                    if (ans.includes('头步桥') && ans.includes('人行道')) {
                        this.showQuestion = false;
                        this.showCongrats = true;
                    } else {
                        this.showWrong = true;
                        setTimeout(() => { this.showWrong = false; }, 2500);
                    }
                },
            },
        }).mount('#app');
    </script>
</body>
</html>
