<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520 · 生日快乐</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8a4c8 0%, #f2c5d8 15%, #e8c8e0 30%, #c8d8f0 50%, #b8d8f0 65%, #a8d8ea 85%, #98d8e8 100%);
            background-attachment: fixed;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #petalCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 40px rgba(200, 150, 180, 0.25), 0 0 80px rgba(200, 180, 200, 0.15);
            padding: 50px 60px;
            text-align: center;
            max-width: 580px;
            width: 100%;
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .heart-deco {
            display: inline-block;
            width: 36px;
            height: 36px;
            position: relative;
            margin: 0 12px;
            animation: heartBeat 1.2s ease-in-out infinite;
            vertical-align: middle;
            transform: translateY(-4px);
        }
        .heart-deco::before,
        .heart-deco::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 30px;
            background: #ff6b8a;
            border-radius: 20px 20px 0 0;
            top: 0;
        }
        .heart-deco::before {
            left: 12px;
            transform: rotate(45deg);
            transform-origin: 0 100%;
        }
        .heart-deco::after {
            left: 0;
            transform: rotate(-45deg);
            transform-origin: 100% 100%;
        }

        @keyframes heartBeat {
            0%, 100% { transform: translateY(-4px) scale(1); }
            14% { transform: translateY(-4px) scale(1.15); }
            28% { transform: translateY(-4px) scale(1); }
            42% { transform: translateY(-4px) scale(1.15); }
            56% { transform: translateY(-4px) scale(1); }
        }

        .title-520 {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b8a, #ff8e9e, #e8879e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 8px;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 42px;
            font-weight: 600;
            color: #d4687c;
            letter-spacing: 6px;
            margin-bottom: 30px;
            text-shadow: 0 2px 12px rgba(220, 130, 150, 0.3);
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e8a0b0, transparent);
            margin: 0 auto 28px;
            border-radius: 1px;
        }

        .blessing {
            font-size: 18px;
            color: #c87890;
            letter-spacing: 2px;
            line-height: 2.2;
            margin-bottom: 24px;
        }
        .blessing p {
            margin: 0;
        }

        .timer-section {
            margin-top: 8px;
        }

        .timer-label {
            font-size: 14px;
            color: #b08090;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .timer-line {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .timer-item {
            display: flex;
            align-items: baseline;
            gap: 3px;
        }
        .timer-num {
            font-size: 28px;
            font-weight: 700;
            color: #d4687c;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Menlo', 'Consolas', 'PingFang SC', monospace;
            letter-spacing: 1px;
        }
        .timer-unit {
            font-size: 13px;
            color: #c0909a;
            letter-spacing: 1px;
        }
        .timer-sep {
            font-size: 20px;
            color: #d0a0a8;
            font-weight: 300;
        }

        .total-days {
            font-size: 15px;
            color: #b87888;
            letter-spacing: 2px;
            font-weight: 500;
            margin-top: 6px;
        }
        .total-days span {
            font-size: 24px;
            font-weight: 700;
            color: #d4687c;
            margin: 0 4px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 36px 24px;
                border-radius: 18px;
            }
            .title-520 {
                font-size: 52px;
                letter-spacing: 4px;
            }
            .subtitle {
                font-size: 30px;
                letter-spacing: 3px;
            }
            .timer-num {
                font-size: 24px;
            }
            .blessing {
                font-size: 16px;
            }
            .heart-deco {
                width: 26px;
                height: 26px;
                margin: 0 6px;
            }
            .heart-deco::before,
            .heart-deco::after {
                width: 14px;
                height: 22px;
            }
        }
    </style>
</head>
<body>
    <canvas id="petalCanvas"></canvas>

    <div id="app">
        <div class="card">
            <div style="display:flex;align-items:center;justify-content:center;">
                <span class="heart-deco"></span>
                <span class="title-520">520</span>
                <span class="heart-deco"></span>
            </div>
            <div class="subtitle">生日快乐</div>
            <div class="divider"></div>

            <div class="blessing">
                <p>愿时光温柔 · 岁月静好</p>
                <p>每一个有你的日子都是最美的风景</p>
                <p>愿未来的每一天，都如初见般美好</p>
            </div>

            <div class="divider"></div>

            <div class="timer-section">
                <div class="timer-label">从 2019年9月7日 至今</div>
                <div class="timer-line">
                    <div class="timer-item">
                        <span class="timer-num">{{ years }}</span>
                        <span class="timer-unit">年</span>
                    </div>
                    <div class="timer-item">
                        <span class="timer-num">{{ months }}</span>
                        <span class="timer-unit">个月</span>
                    </div>
                    <div class="timer-item">
                        <span class="timer-num">{{ days }}</span>
                        <span class="timer-unit">天</span>
                    </div>
                    <span class="timer-sep">·</span>
                    <div class="timer-item">
                        <span class="timer-num">{{ padZero(hours) }}</span>
                        <span class="timer-unit">时</span>
                    </div>
                    <span class="timer-sep">:</span>
                    <div class="timer-item">
                        <span class="timer-num">{{ padZero(minutes) }}</span>
                        <span class="timer-unit">分</span>
                    </div>
                    <span class="timer-sep">:</span>
                    <div class="timer-item">
                        <span class="timer-num">{{ padZero(seconds) }}</span>
                        <span class="timer-unit">秒</span>
                    </div>
                </div>
                <div class="total-days">
                    已经过去了 <span>{{ totalDays }}</span> 天
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('petalCanvas');
            const ctx = canvas.getContext('2d');

            const pinkPalette = [
                '#FFB7C5', '#FFC0CB', '#FFAAB8', '#FFB8C6',
                '#F8A4C8', '#FFD1DC', '#FF9AB2', '#FAB8C4',
                '#FFCCD5', '#FFB3C6', '#FFC4D0', '#FDC5CD',
                '#FFBBC8', '#FFAEC0', '#FFD6E0', '#F9C0C8',
            ];

            let petals = [];
            let sparkles = [];
            let width, height;
            const PETAL_COUNT = 70;
            const SPARKLE_COUNT = 40;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            function createPetal(startAbove) {
                const size = 6 + Math.random() * 20;
                const depthRatio = (size - 6) / 20;
                return {
                    x: Math.random() * (width + 200) - 100,
                    y: startAbove ? -(Math.random() * height * 0.6) : Math.random() * height * 1.2 - height * 0.1,
                    size: size,
                    vx: 0.3 + Math.random() * 1.8,
                    vy: 1.2 + Math.random() * 2.8 - depthRatio * 1.4,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.03,
                    swayPhase: Math.random() * Math.PI * 2,
                    swaySpeed: 0.008 + Math.random() * 0.025,
                    swayAmp: 0.3 + Math.random() * 2.5,
                    color: pinkPalette[Math.floor(Math.random() * pinkPalette.length)],
                    opacity: 0.3 + Math.random() * 0.55 - depthRatio * 0.2,
                };
            }

            function createSparkle(startAbove) {
                return {
                    x: Math.random() * width,
                    y: startAbove ? -(Math.random() * height) : Math.random() * height,
                    size: 1 + Math.random() * 3,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: 0.2 + Math.random() * 1.2,
                    opacity: 0,
                    maxOpacity: 0.4 + Math.random() * 0.6,
                    phase: Math.random() * Math.PI * 2,
                    twinkleSpeed: 0.02 + Math.random() * 0.06,
                };
            }

            function drawPetal(x, y, size, rotation, color, opacity) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.fillStyle = color;
                ctx.beginPath();
                const w = size * 0.38;
                const h = size * 0.9;
                ctx.moveTo(0, -h);
                ctx.bezierCurveTo(w, -h * 0.55, w * 1.1, h * 0.25, 0, h * 0.75);
                ctx.bezierCurveTo(-w * 1.1, h * 0.25, -w, -h * 0.55, 0, -h);
                ctx.fill();

                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.beginPath();
                ctx.ellipse(0, -size * 0.25, size * 0.15, size * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function drawSparkle(x, y, size, opacity) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, opacity));
                const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
                grad.addColorStop(0, 'rgba(255,255,255,1)');
                grad.addColorStop(0.3, 'rgba(255,240,245,0.6)');
                grad.addColorStop(1, 'rgba(255,220,235,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function initPetals() {
                petals = [];
                for (let i = 0; i < PETAL_COUNT; i++) {
                    petals.push(createPetal(false));
                }
                sparkles = [];
                for (let i = 0; i < SPARKLE_COUNT; i++) {
                    sparkles.push(createSparkle(false));
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);

                for (const p of petals) {
                    p.swayPhase += p.swaySpeed;
                    const swayX = Math.sin(p.swayPhase) * p.swayAmp;
                    p.x += p.vx + swayX * 0.3;
                    p.y += p.vy;
                    p.rotation += p.rotationSpeed;

                    drawPetal(p.x, p.y, p.size, p.rotation, p.color, p.opacity);

                    if (p.y > height + p.size * 2 || p.x > width + p.size * 2 || p.x < -p.size * 2) {
                        const np = createPetal(true);
                        p.x = np.x;
                        p.y = np.y;
                        p.size = np.size;
                        p.vx = np.vx;
                        p.vy = np.vy;
                        p.rotation = np.rotation;
                        p.rotationSpeed = np.rotationSpeed;
                        p.swayPhase = np.swayPhase;
                        p.swaySpeed = np.swaySpeed;
                        p.swayAmp = np.swayAmp;
                        p.color = np.color;
                        p.opacity = np.opacity;
                    }
                }

                for (const s of sparkles) {
                    s.phase += s.twinkleSpeed;
                    s.opacity = s.maxOpacity * (0.5 + 0.5 * Math.sin(s.phase));
                    s.x += s.vx;
                    s.y += s.vy;

                    drawSparkle(s.x, s.y, s.size, s.opacity);

                    if (s.y > height + 10 || s.x > width + 10 || s.x < -10) {
                        const ns = createSparkle(true);
                        s.x = ns.x;
                        s.y = ns.y;
                        s.size = ns.size;
                        s.vx = ns.vx;
                        s.vy = ns.vy;
                        s.maxOpacity = ns.maxOpacity;
                        s.phase = ns.phase;
                        s.twinkleSpeed = ns.twinkleSpeed;
                    }
                }

                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                resize();
                initPetals();
            });

            resize();
            initPetals();
            animate();
        })();
    </script>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    years: 0,
                    months: 0,
                    days: 0,
                    hours: 0,
                    minutes: 0,
                    seconds: 0,
                    totalDays: 0,
                };
            },
            mounted() {
                this.updateTime();
                this.timer = setInterval(() => this.updateTime(), 1000);
            },
            beforeUnmount() {
                if (this.timer) clearInterval(this.timer);
            },
            methods: {
                updateTime() {
                    const start = new Date(2019, 8, 7, 0, 0, 0); // 2019-09-07
                    const now = new Date();

                    const diffMs = now - start;
                    this.totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

                    let y = now.getFullYear() - start.getFullYear();
                    let mo = now.getMonth() - start.getMonth();
                    let d = now.getDate() - start.getDate();
                    let h = now.getHours() - start.getHours();
                    let mi = now.getMinutes() - start.getMinutes();
                    let s = now.getSeconds() - start.getSeconds();

                    if (s < 0) { s += 60; mi--; }
                    if (mi < 0) { mi += 60; h--; }
                    if (h < 0) { h += 24; d--; }
                    if (d < 0) {
                        mo--;
                        const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                        d += prevMonth.getDate();
                    }
                    if (mo < 0) { y--; mo += 12; }

                    this.years = y;
                    this.months = mo;
                    this.days = d;
                    this.hours = h;
                    this.minutes = mi;
                    this.seconds = s;
                },
                padZero(n) {
                    return String(n).padStart(2, '0');
                },
            },
        }).mount('#app');
    </script>
</body>
</html>
